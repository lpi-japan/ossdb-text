name: pandoc

on:
  push:
    branches:
      - main
      - fix-*
      - fix/*
      - feat/*
      - feature/*
    paths:
      - image/*
      - Chapter*.md
      - config-pdf.yaml
      - crossref.yaml
      - epub.css
      - listing.tex
      - config-epub.yaml
      - template.tex
      - en/Chapter*.md
      - en/config-pdf.yaml
      - en/config-epub.yaml
      - en/crossref.yaml
      - en/epub.css
      - en/listing-en.tex
      - scripts/validate-translation.sh
      - .github/workflows/pandoc.yaml

jobs:
  check-consistency:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check version/date consistency
        run: |
          PDF_VER=$(grep -oP 'Ver\.\d+\.\d+\.\d+' config-pdf.yaml)
          EPUB_VER=$(grep -oP 'Ver\.\d+\.\d+\.\d+' config-epub.yaml)
          PDF_DATE_JP=$(grep bookVersion config-pdf.yaml | grep -oP '\d+年\d+月\d+日')
          PDF_DATE=$(echo "$PDF_DATE_JP" | sed 's/年/-/g;s/月/-/g;s/日//' | awk -F'-' '{printf "%04d-%02d-%02d", $1, $2, $3}')
          EPUB_DATE=$(grep -oP '(?<=date: )\d{4}-\d{2}-\d{2}' config-epub.yaml)
          ERROR=0
          if [ "$PDF_VER" != "$EPUB_VER" ]; then
            echo "::error::Version mismatch! config-pdf.yaml=$PDF_VER, config-epub.yaml=$EPUB_VER"
            ERROR=1
          fi
          if [ "$PDF_DATE" != "$EPUB_DATE" ]; then
            echo "::error::Date mismatch! config-pdf.yaml=$PDF_DATE, config-epub.yaml=$EPUB_DATE"
            ERROR=1
          fi
          if [ $ERROR -eq 0 ]; then echo "Version/Date OK: $PDF_VER / $EPUB_DATE"; fi
          exit $ERROR

  build-pdf:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/lpi-japan/ossdb-text:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.github_token }}
    steps:
      - uses: actions/checkout@v4
      - run: |
          chapters=$(ls -1 Chapter*.md | grep -v 'Chapter00.md' | sort -V | tr '\n' ' ' | sed 's/ $//')
          pandoc Chapter00.md -o preface.tex # 前書きだけ目次の前に出すために先にtex化しておく
          # 電子版 = 表紙あり、製本・kindleペーパーバック用 = 表紙なし (表紙は別納)
          # まずmd → texまで変換しtex → pdfだけ表紙有無分岐するとより高速だが、toc解決の複雑さを回避するため全行程を2周する
          pandoc -d config-pdf.yaml --template template.tex -B preface.tex ${chapters} -o guide.pdf --verbose 2>&1 | grep -v '^  '
          pandoc -d config-pdf.yaml --template template.tex -B preface.tex ${chapters} -M no-cover=true -o guide_no_cover.pdf --verbose 2>&1 | grep -v '^  '
      - uses: actions/upload-artifact@v4
        with:
          name: pdf-outputs
          path: |
            guide.pdf
            guide_no_cover.pdf
  build-epub:
    runs-on: ubuntu-latest
    container:
      image: pandoc/core:3.1.1.0
    steps:
      - uses: actions/checkout@v4
      - id: list-items
        run: cat $(ls -1 Chapter*.md | sort -V | tr '\n' ' ' | sed 's/ $//') | sed 's/^####.*/#& {-}/' > guide.md
        shell: sh
      - run: /usr/bin/awk 'BEGIN{go=0;}{ if (go==1){print;} else {if($$0 ~ /^#/) { go=1;print;}}}' guide.md | pandoc -t epub3 -F pandoc-crossref -o guide.epub -N -M "crossrefYaml=crossref.yaml" --metadata-file=config-epub.yaml --epub-cover-image=image/Cover/電子版表紙_300dpi_2480x3508.png --css=epub.css
      - uses: actions/upload-artifact@v4
        with:
          name: guide.epub
          path: guide.epub

  check-translation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check JP/EN structural consistency
        run: |
          cd ossdb-text 2>/dev/null || true
          bash scripts/validate-translation.sh

  check-consistency-en:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check EN version/date consistency
        run: |
          PDF_VER=$(grep -oP 'Ver\.\d+\.\d+\.\d+' en/config-pdf.yaml)
          EPUB_VER=$(grep -oP 'Ver\.\d+\.\d+\.\d+' en/config-epub.yaml)
          PDF_DATE=$(grep bookVersion en/config-pdf.yaml | grep -oP '[A-Z][a-z]+ \d+, \d{4}' | python3 -c "import sys,datetime; d=datetime.datetime.strptime(sys.stdin.read().strip(),'%B %d, %Y'); print(d.strftime('%Y-%m-%d'))")
          EPUB_DATE=$(grep -oP '(?<=date: )\d{4}-\d{2}-\d{2}' en/config-epub.yaml)
          ERROR=0
          if [ "$PDF_VER" != "$EPUB_VER" ]; then
            echo "::error::EN Version mismatch! config-pdf.yaml=$PDF_VER, config-epub.yaml=$EPUB_VER"
            ERROR=1
          fi
          if [ "$PDF_DATE" != "$EPUB_DATE" ]; then
            echo "::error::EN Date mismatch! config-pdf.yaml=$PDF_DATE, config-epub.yaml=$EPUB_DATE"
            ERROR=1
          fi
          if [ $ERROR -eq 0 ]; then echo "EN Version/Date OK: $PDF_VER / $EPUB_DATE"; fi
          exit $ERROR

  build-pdf-en:
    needs: [check-translation, check-consistency-en]
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/lpi-japan/ossdb-text:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.github_token }}
    steps:
      - uses: actions/checkout@v4
      - run: |
          cd en
          chapters=$(ls -1 Chapter*.md | grep -v 'Chapter00.md' | sort -V | tr '\n' ' ' | sed 's/ $//')
          pandoc Chapter00.md -o preface.tex
          pandoc -d config-pdf.yaml --template ../template.tex -B preface.tex ${chapters} -o guide-en.pdf --verbose 2>&1 | grep -v '^  '
          pandoc -d config-pdf.yaml --template ../template.tex -B preface.tex ${chapters} -M no-cover=true -o guide-en_no_cover.pdf --verbose 2>&1 | grep -v '^  '
      - uses: actions/upload-artifact@v4
        with:
          name: pdf-en-outputs
          path: |
            en/guide-en.pdf
            en/guide-en_no_cover.pdf

  build-epub-en:
    needs: check-translation
    runs-on: ubuntu-latest
    container:
      image: pandoc/core:3.1.1.0
    steps:
      - uses: actions/checkout@v4
      - run: |
          cd en
          cat $(ls -1 Chapter*.md | sort -V | tr '\n' ' ' | sed 's/ $//') | sed 's/^####.*/#& {-}/' > guide-en.md
          /usr/bin/awk 'BEGIN{go=0;}{ if (go==1){print;} else {if($$0 ~ /^#/) { go=1;print;}}}' guide-en.md | pandoc -t epub3 -F pandoc-crossref -o guide-en.epub -N -M "crossrefYaml=crossref.yaml" --metadata-file=config-epub.yaml --css=epub.css
      - uses: actions/upload-artifact@v4
        with:
          name: guide-en.epub
          path: en/guide-en.epub
